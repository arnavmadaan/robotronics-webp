<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ROBOTRONICS | Compare Parts</title>
  <meta name="description" content="Compare robotics parts side-by-side with visual spec bars. Motors, boards, drivers, sensors and more.">
  <link rel="stylesheet" href="CSS/style.css">
</head>
<body>

  <header>
    <div class="cart-icon" onclick="window.location.href='cart.html'">
      🛒 <span id="cart-count">0</span>
    </div>
    <a href="index.html" class="back-link">← Back to Home</a>
    <h1>⚡ Compare Parts</h1>
    <p>Select a category to compare specs side-by-side</p>
  </header>

  <main>
    <div class="compare-controls">
      <select class="compare-select" id="category-select">
        <option value="">— Select Category —</option>
        <option value="motors">Motors</option>
        <option value="boards">Controller Boards</option>
        <option value="motor_drivers">Motor Drivers</option>
        <option value="ir_sensors">IR Sensors</option>
        <option value="actuators">Actuators</option>
        <option value="depth_sensors">Depth Sensors</option>
      </select>
    </div>

    <div id="compare-container" class="compare-grid"></div>
  </main>

  <script src="JS/compare.js"></script>
  <script src="JS/cartSystem.js"></script>

</body>
</html>
